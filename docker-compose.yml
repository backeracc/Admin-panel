version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    # Ensure MongoDB URL inside .env works, or provide network settings if MongoDB is local.
    # Since we are using MongoDB Atlas (cloud), it works seamlessly out-of-the-box.

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - API_TARGET=http://backend:3001
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - API_TARGET=http://backend:3001
    depends_on:
      - backend
